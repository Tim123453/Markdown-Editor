<!DOCTYPE html>
<html>
  <head>
    <title>Markdown Reader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="scripts/script.js" defer></script>
  </head>
  <body> 
    <header class="header">
      <div class="header-left-section">
        <button id="save-button" class="header-button" title="Speichern (Strg + S)" >
          <img class="icon" src="images/icons/save.svg">
        </button>
        <button id="undo-button" class="header-button" title="Rückgängig (Strg + Z)">
          <img class="icon" src="images/icons/undo.svg">
        </button>
        <button id="redo-button" class="header-button" title="Wiederherstellen (Strg + Shift + Z)">
          <img class="icon" src="images/icons/redo.svg">
        </button>
        <button id="bold-button" class="header-button" title="Fett (Strg + B)">
          <img class="icon" src="images/icons/bold.svg">
        </button>
        <button id="italic-button" class="header-button" title="Kursiv (Strg + I)">
          <img class="icon" src="images/icons/italic.svg">
        </button>
        <button id="strikethrough-button" class="header-button" title="Durchgestrichen (Strg + Shift + S)">
          <img class="icon" src="images/icons/strikethrough.svg">
        </button>
        <button id="highlighter-button" class="header-button" title="Markierung (Strg + Shift + M)">
          <img class="icon" src="images/icons/highlighter.svg" >
        </button>
        <button id="heading-button" class="header-button" title="Überschrift (Strg + Shift + H)">
          <img class="icon" src="images/icons/heading.svg">
        </button>
        <button id="ul-button" class="header-button" title="Stichpunktliste (Strg + .)">
          <img class="icon" src="images/icons/list-ul.svg">
        </button>
        <button id="ol-button" class="header-button" title="Aufzählungs-Liste (Strg + Shift + .)">
          <img class="icon" src="images/icons/list-ol.svg">
        </button>
        <button id="cl-button" class="header-button" title="Checkliste (Strg + ,)">
          <img class="icon" src="images/icons/list-check.svg">
        </button>
        <button id="quote-button" class="header-button" title="Checkliste (Strg + ,)">
          <img class="icon" src="images/icons/quote.svg">
        </button>
        <button id="code-button" class="header-button" title="Code-Block (Strg + shift + c)">
          <img class="icon" src="images/icons/code.svg">
        </button>
        <button id="table-button" class="header-button" title="Tabelle (Strg + shift + t)">
          <img class="icon" src="images/icons/table.svg">
        </button>
        <button id="save-button" class="header-button" title="Link (Strg + shift + l)">
          <img class="icon" src="images/icons/link.svg">
        </button>
      </div>
      <div class="header-logo-section">
        <h1>Markdown Editor</h1>
      </div>
      <div class="header-left-section">
        <button class="header-button" title="Fullscreen (Strg + Shift + F)">
          <img class="icon" src="images/icons/full-screen.svg">
        </button>
        <button class="header-button" title="Download">
          <img class="icon" src="images/icons/download.svg">
        </button>
        <button class="header-button" title="Speichern">
          <img class="icon" src="images/icons/upload.svg">
        </button>
        <button class="header-button" title="Gliederung anzeigen">
          <img class="icon" src="images/icons/document-layout.svg">
        </button>
        <button class="header-button" title="Markdown Spickzettel">
          <img class="icon" src="images/icons/help.svg">
        </button>
      </div>

    </header>
    <main class="main">
      <section class="main-left-section">
        <textarea id="input-area" placeholder="Eingabe"></textarea>
        <button class="layout-button-left">
          <img class="layout-icon" src="images/icons/arrow-right.svg" title="Nur Markdown Editor">
        </button>
      </section>
      <section class="main-right-section" id="output-area">
        <p class="output-text">
          Test
        </p>
        <button class="layout-button-right">
          <img class="layout-icon" src="images/icons/arrow-left.svg" title="Nur Markdown Reader">
        </button>
      </section>
    </main>
  </body>
</html>
