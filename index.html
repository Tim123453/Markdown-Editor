<!DOCTYPE html>
<html>
  <head>
    <title>Markdown Reader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="scripts/script.js" defer></script>
  </head>
  <body> 
    <header class="header">
      <div class="header-left-section">
        <button class="header-button" title="Speichern (Strg + S)">
          <img class="icon" src="images/icons/save.svg">
        </button>
        <button class="header-button" title="Rückgängig (Strg + Z)">
          <img class="icon" src="images/icons/undo.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/redo.svg" title="Wiederherstellen (Strg + Shift + Z)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/bold.svg" title="Fett (Strg + B)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/italic.svg" title="Kursiv (Strg + I)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/strikethrough.svg" title="Durchgestrichen (Strg + Shift + S)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/highlighter.svg" title="Markierung (Strg + Shift + M)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/heading.svg" title="Überschrift (Strg + Shift + H)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-ul.svg" title="Stichpunktliste (Strg + .)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-ol.svg" title="Aufzählungs-Liste (Strg + Shift + .)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-check.svg" title="Checkliste (Strg + ,)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/quote.svg" title="Zitat (Strg + SHift + q)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/code.svg" title="Code-Block (Strg + shift + c)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/table.svg" title="Tabelle (Strg + shift + t)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/link.svg" title="Link (Strg + shift + l)">
        </button>
      </div>
      <div class="header-logo-section">
        <h1>Markdown Editor</h1>
      </div>
      <div class="header-left-section">
        <button class="header-button">
          <img class="icon" src="images/icons/full-screen.svg" title="Fullscreen (Strg + Shift + F)">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/download.svg" title="Download">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/upload.svg" title="Speichern">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/document-layout.svg "title="Gliederung anzeigen">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/help.svg" title="Markdown Spickzettel">
        </button>
      </div>

    </header>
    <main class="main">
      <section class="main-left-section">
        <textarea id="input-area" placeholder="Eingabe"></textarea>
        <button class="layout-button-left">
          <img class="layout-icon" src="images/icons/arrow-right.svg" title="Nur Markdown Editor">
        </button>
      </section>
      <section class="main-right-section" id="output-area">
        <p class="output-text">
          Test
        </p>
        <button class="layout-button-right">
          <img class="layout-icon" src="images/icons/arrow-left.svg" title="Nur Markdown Reader">
        </button>
      </section>
    </main>
  </body>
</html>
