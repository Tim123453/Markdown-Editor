<!DOCTYPE html>
<html>
  <head>
    <title>Markdown Reader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
  </head>
  <body>
    <header class="header">
      <p class="title">Markdown Reader</p>
    </header>
    <main class="main">
      <form class="input-form">
        <section class="input-form-left">
          <label>Eingabe</label>
          <textarea id="input-textarea" placeholder="Eingabe">
            
          </textarea>
        </section>
        <button class="input-button">
          Umwandeln
        </button>
      </form>
      <textarea id="output-textarea" placeholder="Ausgabe">
        
      </textarea>
    </main>
  </body>
</html>
