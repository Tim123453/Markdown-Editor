<!DOCTYPE html>
<html>
  <head>
    <title>Markdown Reader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="scripts/script.js" defer></script>
  </head>
  <body> 
    <header class="header">
      <div class="header-left-section">
        <button class="header-button">
          <img class="icon" src="images/icons/save.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/undo.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/redo.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/bold.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/italic.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/strikethrough.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/highlighter.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/heading.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-ul.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-ol.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/list-check.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/quote.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/code.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/table.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/link.svg">
        </button>
      </div>
      <div class="header-logo-section">
        <h1>Markdown Reader</h1>
      </div>
      <div class="header-left-section">
        <button class="header-button">
          <img class="icon" src="images/icons/full-screen.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/download.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/upload.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/document-layout.svg">
        </button>
        <button class="header-button">
          <img class="icon" src="images/icons/help.svg">
        </button>
      </div>

    </header>
    <main class="main">
      <section class="main-left-section">
        <textarea id="input-area" placeholder="Eingabe"></textarea>
        <button class="layout-button-left">
          <img class="layout-icon" src="images/icons/arrow-right.svg">
        </button>
      </section>
      <section class="main-right-section" id="output-area">
        <p class="output-text">
          Test
        </p>
        <button class="layout-button-right">
          <img class="layout-icon" src="images/icons/arrow-left.svg">
        </button>
      </section>
    </main>
  </body>
</html>
